<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДЗ: № 74.2 Гідравлічний прес</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&family=Montserrat:wght@900&display=swap');
        
        body { 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
        }

        .cambria-font { font-family: 'Cambria', 'Noto Sans', serif; }
        .montserrat { font-family: 'Montserrat', sans-serif; }

        .fade-in-row {
            animation: fadeIn 0.4s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .certificate-pop {
            animation: certPop 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes certPop {
            0% { transform: scale(0.5) rotate(-5deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .download-btn {
            background: linear-gradient(to right, #3b82f6, #2563eb);
            transition: all 0.3s ease;
        }
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(59, 130, 246, 0.4);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CheckCircle2 = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="text-green-500 w-6 h-6"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
        );
        const XCircle = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-red-400 w-6 h-6"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
        );
        const AlertTriangle = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-3 h-3 text-amber-500"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        );

        const formatNum = (num) => {
            if (num === "" || num === undefined) return "";
            return num.toString().replace('.', ',');
        };

        const App = () => {
            const initialTasks = [
                { id: 1, f1: "50", s1: "200", f2: "", s2: "2", target: "f2", correct: 5000, uF: "Н", uS: "см²", uF2: "Н", uS2: "м²", uRes: "Н", warned: "s1" },
                { id: 2, f1: "0,5", s1: "10", f2: "250", s2: "", target: "s2", correct: 5, uF: "кН", uS: "см²", uF2: "Н", uS2: "см²", uRes: "см²", warned: "f1" },
                { id: 3, f1: "", s1: "400", f2: "1000", s2: "1", target: "f1", correct: 40, uF: "Н", uS: "см²", uF2: "Н", uS2: "м²", uRes: "Н", warned: "s1" },
                { id: 4, f1: "20", s1: "0,005", f2: "0,4", s2: "", target: "s2", correct: 0.1, uF: "Н", uS: "м²", uF2: "кН", uS2: "м²", uRes: "м²", warned: "f2" },
                { id: 5, f1: "", s1: "10", f2: "1,5", s2: "300", target: "f1", correct: 50, uF: "Н", uS: "см²", uF2: "кН", uS2: "см²", uRes: "Н", warned: "f2" },
                { id: 6, f1: "1,5", s1: "50", f2: "", s2: "150", target: "f2", correct: 4.5, uF: "кН", uS: "см²", uF2: "кН", uS2: "см²", uRes: "кН", warned: "f1" }
            ];

            const optionsMap = {
                1: [5000, 500, 50, 250],
                2: [5, 50, 500, 20],
                3: [40, 4, 400, 10],
                4: [0.1, 0.01, 1, 0.5],
                5: [50, 5, 500, 15],
                6: [4.5, 45, 0.45, 15]
            };

            const [tasks, setTasks] = useState([]);
            const [userInputs, setUserInputs] = useState({});
            const [results, setResults] = useState({});
            const [studentName, setStudentName] = useState("");
            const [showAward, setShowAward] = useState(false);
            const [finalCertificate, setFinalCertificate] = useState(false);
            
            const audioCtx = useRef(null);
            const certRef = useRef(null);

            useEffect(() => {
                const ordered = initialTasks.map(t => ({
                    ...t,
                    opt: [...optionsMap[t.id]].sort(() => Math.random() - 0.5)
                }));
                setTasks(ordered);
            }, []);

            useEffect(() => {
                const allCorrect = tasks.length > 0 && tasks.every(t => results[t.id] === 'correct');
                if (allCorrect && !finalCertificate) {
                    setShowAward(true);
                    playFanfare();
                }
            }, [results, tasks]);

            const playFanfare = () => {
                try {
                    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                    const ctx = new AudioContextClass();
                    const notes = [523.25, 659.25, 783.99, 1046.50]; // C5, E5, G5, C6
                    notes.forEach((freq, i) => {
                        const osc = ctx.createOscillator();
                        const g = ctx.createGain();
                        osc.type = 'triangle';
                        osc.frequency.setValueAtTime(freq, ctx.currentTime + i * 0.15);
                        g.gain.setValueAtTime(0, ctx.currentTime + i * 0.15);
                        g.gain.linearRampToValueAtTime(0.1, ctx.currentTime + i * 0.15 + 0.05);
                        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.15 + 0.4);
                        osc.connect(g); g.connect(ctx.destination);
                        osc.start(ctx.currentTime + i * 0.15);
                        osc.stop(ctx.currentTime + i * 0.15 + 0.5);
                    });
                } catch (e) {}
            };

            const playSound = (type) => {
                try {
                    if (!audioCtx.current) {
                        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                        audioCtx.current = new AudioContextClass();
                    }
                    const osc = audioCtx.current.createOscillator();
                    const g = audioCtx.current.createGain();
                    osc.connect(g); g.connect(audioCtx.current.destination);
                    osc.frequency.setValueAtTime(type === 'success' ? 880 : 220, audioCtx.current.currentTime);
                    g.gain.setValueAtTime(0.05, audioCtx.current.currentTime);
                    osc.start(); osc.stop(audioCtx.current.currentTime + 0.1);
                } catch (e) {}
            };

            const handleSelect = (id, val) => {
                if (val === "") return;
                setUserInputs(prev => ({ ...prev, [id]: val }));
                const task = tasks.find(t => t.id === id);
                const numericValue = parseFloat(val.toString().replace(',', '.'));
                
                if (Math.abs(numericValue - task.correct) < 0.00001) {
                    playSound('success'); 
                    setResults(prev => ({ ...prev, [id]: 'correct' }));
                } else {
                    playSound('error'); 
                    setResults(prev => ({ ...prev, [id]: 'wrong' }));
                }
            };

            const handleGenerateCertificate = () => {
                if (studentName.trim().length > 2) {
                    setShowAward(false);
                    setFinalCertificate(true);
                    setTimeout(() => {
                        confetti({
                            particleCount: 200,
                            spread: 100,
                            origin: { y: 0.6 },
                            colors: ['#3b82f6', '#fbbf24', '#ffffff', '#22c55e']
                        });
                    }, 300);
                }
            };

            const downloadCertificate = () => {
                const node = certRef.current;
                html2canvas(node, { 
                    backgroundColor: null,
                    scale: 2,
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = `Сертифікат_${studentName}.png`;
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });
            };

            const DisplayValue = ({ val, unit, isWarned }) => (
                <div className="flex flex-col items-center whitespace-nowrap">
                    <div className="flex items-baseline justify-center gap-1.5">
                        <span className="text-xl md:text-2xl font-bold text-slate-700">{formatNum(val)}</span>
                        <span className="text-sm md:text-lg font-bold text-slate-400">{unit}</span>
                    </div>
                    {isWarned && (
                        <div className="flex items-center gap-1 mt-1 px-2 py-0.5 bg-amber-50 rounded text-[8px] md:text-[9px] text-amber-700 font-bold uppercase tracking-tighter border border-amber-100">
                            <AlertTriangle /> Увага: Одиниці
                        </div>
                    )}
                </div>
            );

            return (
                <div className="w-full min-h-screen py-6 md:py-10 px-2 md:px-4 flex justify-center items-start cambria-font text-slate-900 relative">
                    <div className="w-full max-w-7xl space-y-6 md:space-y-8">
                        {/* Header */}
                        <div className="flex flex-col md:flex-row justify-between items-center md:items-end gap-4 px-2">
                            <div className="text-center md:text-left">
                                <h1 className="text-2xl md:text-4xl font-black text-slate-800 tracking-tight">№74.2 Домашнє завдання</h1>
                                <p className="text-slate-500 mt-1 italic text-base md:text-lg font-bold">Гідравлічний прес (профі-рівень)</p>
                            </div>
                            <div className="bg-white px-4 py-2 rounded-full border border-slate-200 shadow-sm flex items-center gap-3">
                                <div className="flex -space-x-1">
                                    {[...Array(6)].map((_, i) => (
                                        <div key={i} className={`w-3 h-3 rounded-full border border-white ${results[i+1] === 'correct' ? 'bg-green-500' : 'bg-slate-200'}`}></div>
                                    ))}
                                </div>
                                <span className="text-xs font-black text-slate-400 uppercase tracking-widest">Прогрес</span>
                            </div>
                        </div>

                        {/* Main Table */}
                        <div className="bg-white border border-slate-200 rounded-xl md:rounded-[2rem] shadow-xl table-container relative overflow-hidden">
                            <table className="w-full min-w-[750px] text-center border-collapse">
                                <thead>
                                    <tr className="bg-slate-50 border-b border-slate-100">
                                        <th colSpan="2" className="py-4 md:py-6 text-[10px] font-black text-blue-600 uppercase tracking-widest">Малий поршень (1)</th>
                                        <th colSpan="2" className="py-4 md:py-6 text-[10px] font-black text-rose-600 uppercase tracking-widest border-l border-slate-100">Великий поршень (2)</th>
                                        <th rowSpan="2" className="w-20 md:w-28 border-l border-slate-100 bg-slate-50/50">Результат</th>
                                    </tr>
                                    <tr className="bg-white text-slate-400 border-b border-slate-100">
                                        <th className="py-3 text-[11px] font-bold uppercase">Сила F₁</th>
                                        <th className="py-3 text-[11px] font-bold uppercase">Площа S₁</th>
                                        <th className="py-3 text-[11px] font-bold uppercase border-l border-slate-100">Сила F₂</th>
                                        <th className="py-3 text-[11px] font-bold uppercase">Площа S₂</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {tasks.map((t, idx) => (
                                        <tr key={t.id} className="fade-in-row hover:bg-slate-50/30 transition-colors" style={{animationDelay: `${idx * 0.05}s`}}>
                                            <td className="p-4 md:p-8">
                                                {t.target === 'f1' ? (
                                                    <div className="flex flex-col items-center gap-1">
                                                        <select onChange={(e) => handleSelect(t.id, e.target.value)} value={userInputs[t.id] || ''} 
                                                            disabled={results[t.id] === 'correct'}
                                                            className={`w-24 md:w-32 border-2 rounded-lg py-2 px-1 font-bold text-center transition-all outline-none ${results[t.id] === 'correct' ? 'bg-green-500 border-green-500 text-white cursor-default' : results[t.id] === 'wrong' ? 'bg-red-50 border-red-300 text-red-700' : 'bg-white border-slate-200 hover:border-blue-300 focus:border-blue-500'}`}>
                                                            <option value="">?</option>{t.opt.map(o => <option key={o} value={o}>{formatNum(o)}</option>)}
                                                        </select>
                                                        <span className="text-[10px] font-bold text-slate-400 mt-1 uppercase">{t.uRes}</span>
                                                    </div>
                                                ) : <DisplayValue val={t.f1} unit={t.uF} isWarned={t.warned === 'f1'} />}
                                            </td>
                                            <td className="p-4 md:p-8">
                                                {t.target === 's1' ? (
                                                    <div className="flex flex-col items-center gap-1">
                                                        <select onChange={(e) => handleSelect(t.id, e.target.value)} value={userInputs[t.id] || ''} 
                                                            disabled={results[t.id] === 'correct'}
                                                            className={`w-24 md:w-32 border-2 rounded-lg py-2 px-1 font-bold text-center transition-all outline-none ${results[t.id] === 'correct' ? 'bg-green-500 border-green-500 text-white cursor-default' : results[t.id] === 'wrong' ? 'bg-red-50 border-red-300 text-red-700' : 'bg-white border-slate-200 hover:border-blue-300 focus:border-blue-500'}`}>
                                                            <option value="">?</option>{t.opt.map(o => <option key={o} value={o}>{formatNum(o)}</option>)}
                                                        </select>
                                                        <span className="text-[10px] font-bold text-slate-400 mt-1 uppercase">{t.uRes}</span>
                                                    </div>
                                                ) : <DisplayValue val={t.s1} unit={t.uS} isWarned={t.warned === 's1'} />}
                                            </td>
                                            <td className="p-4 md:p-8 border-l border-slate-100">
                                                {t.target === 'f2' ? (
                                                    <div className="flex flex-col items-center gap-1">
                                                        <select onChange={(e) => handleSelect(t.id, e.target.value)} value={userInputs[t.id] || ''} 
                                                            disabled={results[t.id] === 'correct'}
                                                            className={`w-24 md:w-32 border-2 rounded-lg py-2 px-1 font-bold text-center transition-all outline-none ${results[t.id] === 'correct' ? 'bg-green-500 border-green-500 text-white cursor-default' : results[t.id] === 'wrong' ? 'bg-red-50 border-red-300 text-red-700' : 'bg-white border-slate-200 hover:border-blue-300 focus:border-blue-500'}`}>
                                                            <option value="">?</option>{t.opt.map(o => <option key={o} value={o}>{formatNum(o)}</option>)}
                                                        </select>
                                                        <span className="text-[10px] font-bold text-slate-400 mt-1 uppercase">{t.uRes}</span>
                                                    </div>
                                                ) : <DisplayValue val={t.f2} unit={t.uF2} isWarned={t.warned === 'f2'} />}
                                            </td>
                                            <td className="p-4 md:p-8">
                                                {t.target === 's2' ? (
                                                    <div className="flex flex-col items-center gap-1">
                                                        <select onChange={(e) => handleSelect(t.id, e.target.value)} value={userInputs[t.id] || ''} 
                                                            disabled={results[t.id] === 'correct'}
                                                            className={`w-24 md:w-32 border-2 rounded-lg py-2 px-1 font-bold text-center transition-all outline-none ${results[t.id] === 'correct' ? 'bg-green-500 border-green-500 text-white cursor-default' : results[t.id] === 'wrong' ? 'bg-red-50 border-red-300 text-red-700' : 'bg-white border-slate-200 hover:border-blue-300 focus:border-blue-500'}`}>
                                                            <option value="">?</option>{t.opt.map(o => <option key={o} value={o}>{formatNum(o)}</option>)}
                                                        </select>
                                                        <span className="text-[10px] font-bold text-slate-400 mt-1 uppercase">{t.uRes}</span>
                                                    </div>
                                                ) : <DisplayValue val={t.s2} unit={t.uS2} isWarned={t.warned === 's2'} />}
                                            </td>
                                            <td className="p-2 md:p-4 border-l border-slate-100 bg-slate-50/30">
                                                <div className="flex justify-center">
                                                    {results[t.id] === 'correct' ? (
                                                        <div className="scale-110"><CheckCircle2 /></div>
                                                    ) : results[t.id] === 'wrong' ? (
                                                        <XCircle />
                                                    ) : (
                                                        <div className="w-6 h-6 rounded-full border-2 border-dashed border-slate-200"></div>
                                                    )}
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>

                        {/* Modal: Input Name */}
                        {showAward && (
                            <div className="fixed inset-0 z-[60] flex items-center justify-center bg-slate-900/70 backdrop-blur-md p-4">
                                <div className="bg-white rounded-[2.5rem] p-8 md:p-12 max-w-lg w-full shadow-2xl border-b-8 border-blue-600 certificate-pop text-center">
                                    <div className="text-7xl mb-6">🎉</div>
                                    <h2 className="text-3xl font-black text-slate-800 mb-2">ВІТАЮ!</h2>
                                    <p className="text-slate-500 mb-8 font-bold uppercase text-xs tracking-[0.2em]">Усі задачі розв'язано правильно</p>
                                    
                                    <div className="space-y-4">
                                        <p className="text-slate-700 font-bold">Введіть Прізвище та Ім'я для сертифіката:</p>
                                        <input 
                                            type="text" 
                                            value={studentName}
                                            onChange={(e) => setStudentName(e.target.value)}
                                            placeholder="Коваль Богдан"
                                            className="w-full bg-slate-50 border-2 border-slate-200 rounded-2xl py-4 px-6 text-center text-xl font-bold focus:border-blue-500 focus:bg-white outline-none transition-all"
                                        />
                                        <button 
                                            onClick={handleGenerateCertificate}
                                            disabled={studentName.trim().length < 3}
                                            className={`w-full py-5 rounded-2xl text-xl font-black shadow-lg transform active:scale-95 transition-all ${studentName.trim().length >= 3 ? 'bg-blue-600 text-white hover:bg-blue-700' : 'bg-slate-100 text-slate-400 cursor-not-allowed'}`}
                                        >
                                            СТВОРИТИ СЕРТИФІКАТ ✨
                                        </button>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Final Certificate Area */}
                        {finalCertificate && (
                            <div className="flex flex-col items-center justify-center py-12 gap-8 fade-in-row">
                                <div 
                                    ref={certRef}
                                    className="relative w-full max-w-[500px] aspect-square bg-white rounded-[3rem] shadow-2xl border-[12px] border-blue-500 overflow-hidden flex flex-col items-center justify-between p-8 text-center"
                                >
                                    {/* Decor */}
                                    <div className="absolute top-[-50px] left-[-50px] w-40 h-40 bg-blue-100 rounded-full opacity-50"></div>
                                    <div className="absolute bottom-[-30px] right-[-30px] w-32 h-32 bg-amber-100 rounded-full opacity-50"></div>
                                    
                                    <div className="z-10 mt-4">
                                        <div className="text-xs font-black text-blue-600 uppercase tracking-[0.3em] mb-2">Фізика • 7 Клас</div>
                                        <h3 className="text-2xl font-black text-slate-800 leading-tight">СЕРТИФІКАТ ЗНАТОКА ГІДРАВЛІКИ</h3>
                                    </div>

                                    <div className="z-10 flex flex-col items-center">
                                        <div className="text-8xl md:text-9xl mb-4 drop-shadow-lg">😎</div>
                                        <div className="bg-slate-50 px-8 py-3 rounded-2xl border-2 border-slate-100">
                                            <span className="text-2xl md:text-3xl font-black text-blue-700 montserrat">
                                                {studentName}
                                            </span>
                                        </div>
                                        <p className="mt-4 text-slate-500 font-bold italic">успішно опанував тему гідравлічного преса</p>
                                    </div>

                                    <div className="z-10 mb-4 w-full flex justify-between items-end px-4">
                                        <div className="text-left">
                                            <div className="text-[10px] font-black text-slate-300 uppercase">Дата</div>
                                            <div className="text-sm font-bold text-slate-600">{new Date().toLocaleDateString('uk-UA')}</div>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-[10px] font-black text-slate-300 uppercase">Статус</div>
                                            <div className="text-sm font-bold text-green-600">ВІДМІННО (12)</div>
                                        </div>
                                    </div>
                                    
                                    {/* Seal */}
                                    <div className="absolute top-8 right-8 w-16 h-16 border-4 border-amber-400 rounded-full flex items-center justify-center rotate-12 bg-white">
                                        <span className="text-2xl">⭐</span>
                                    </div>
                                </div>

                                <div className="flex flex-col sm:flex-row gap-4 w-full max-w-[500px]">
                                    <button 
                                        onClick={downloadCertificate}
                                        className="flex-1 download-btn text-white font-black py-5 px-8 rounded-2xl text-lg flex items-center justify-center gap-3"
                                    >
                                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                        ЗБЕРЕГТИ ФОТО
                                    </button>
                                    <button 
                                        onClick={() => window.location.reload()}
                                        className="bg-white border-2 border-slate-200 text-slate-500 font-bold py-5 px-8 rounded-2xl hover:bg-slate-50 transition-all"
                                    >
                                        ЩЕ РАЗ
                                    </button>
                                </div>
                                <p className="text-slate-400 text-sm font-bold animate-pulse">📸 Натисніть кнопку вище, щоб завантажити результат</p>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
