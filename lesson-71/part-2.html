<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Інтерактивна логіка виведення формули</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Inter', sans-serif;
            color: #1e293b;
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .fraction {
            display: inline-flex;
            flex-direction: column;
            vertical-align: middle;
            text-align: center;
            line-height: 1.1;
            margin: 0 4px;
        }
        .fraction-top {
            border-bottom: 2px solid currentColor;
            padding: 0 6px;
        }
        .fraction-bottom {
            padding: 0 6px;
        }
        .math {
            font-family: "Times New Roman", Times, serif;
            font-style: italic;
            font-variant-numeric: tabular-nums;
        }
        .formula-card {
            border: 2px solid #e2e8f0;
            border-radius: 16px;
            padding: 1.25rem;
            background: white;
            min-width: 180px;
            text-align: center;
            box-shadow: 0 4px 10px -2px rgb(0 0 0 / 0.05);
            position: relative;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            cursor: pointer;
            z-index: 10;
        }
        .formula-card:hover {
            border-color: #3b82f6;
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgb(59 130 246 / 0.1);
        }
        .main-card {
            border: 4px solid #3b82f6;
            background: #eff6ff;
            cursor: default;
        }
        .main-card:hover {
            transform: none;
        }
        .route-card {
            border: 3px solid #10b981;
            border-radius: 20px;
            padding: 2rem;
            background: #ffffff;
            text-align: center;
            box-shadow: 0 20px 25px -5px rgb(16 185 129 / 0.1);
            opacity: 0;
            transform: translateY(30px);
            pointer-events: none;
            transition: all 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        .route-card.visible {
            opacity: 1;
            transform: translateY(0);
            pointer-events: auto;
        }
        .placeholder-btn {
            width: 180px;
            height: 110px;
            border: 2px dashed #cbd5e1;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            background: #f1f5f9;
            transition: all 0.3s ease;
        }
        .placeholder-btn:hover {
            background: #e2e8f0;
            border-color: #3b82f6;
            transform: scale(1.05);
        }
        .placeholder-btn span {
            font-size: 2.5rem;
            color: #94a3b8;
            font-weight: 900;
        }
        .node-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 160px;
        }
        .hidden-node {
            display: none;
        }
        .visible-node {
            display: block;
            animation: bounceIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }
        @keyframes bounceIn {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
        #arrow-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1;
        }
        .step-number {
            font-weight: 800;
            fill: #3b82f6;
            font-size: 22px;
            font-family: 'Inter', sans-serif;
            paint-order: stroke;
            stroke: white;
            stroke-width: 4px;
        }
        .arrow-line {
            stroke: #3b82f6;
            stroke-width: 3;
            fill: none;
            stroke-linecap: round;
        }
    </style>
</head>
<body class="p-6 md:p-12">

    <svg id="arrow-canvas">
        <defs>
            <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
                <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6" />
            </marker>
        </defs>
    </svg>

    <div class="w-full max-w-7xl relative z-10 flex flex-col items-center">
        <header class="text-center mb-16">
            <h1 class="text-3xl md:text-4xl font-black uppercase tracking-tight text-slate-800">Виведення формули тиску</h1>
            <button onclick="resetAll()" class="mt-6 px-8 py-2 bg-slate-800 text-white rounded-full text-sm font-bold hover:bg-slate-700 transition-all shadow-lg active:scale-95">Скинути схему</button>
        </header>

        <!-- Початок -->
        <div id="start-node" class="formula-card main-card mb-24">
            <div class="text-xs text-blue-600 font-bold mb-3 uppercase tracking-widest">Основна формула</div>
            <div class="math text-5xl">
                p = <div class="fraction">
                    <span class="fraction-top">F</span>
                    <span class="fraction-bottom">S</span>
                </div>
            </div>
        </div>

        <!-- Гілки розгалуження -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-12 w-full mb-32">
            
            <div class="node-container">
                <div id="btn-1" class="placeholder-btn" onclick="toggleNode(1)"><span>?</span></div>
                <div id="node-1" class="hidden-node text-center" onclick="toggleNode(1)">
                    <div class="text-sm text-blue-600 font-bold mb-2 italic">F = P = m · g</div>
                    <div class="formula-card">
                        <div class="text-[10px] text-slate-400 font-bold mb-2 uppercase">Заміна сили</div>
                        <div class="math text-3xl">
                            p = <div class="fraction">
                                <span class="fraction-top">m · g</span>
                                <span class="fraction-bottom">S</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="node-container">
                <div id="btn-2" class="placeholder-btn" onclick="toggleNode(2)"><span>?</span></div>
                <div id="node-2" class="hidden-node text-center" onclick="toggleNode(2)">
                    <div class="text-sm text-blue-600 font-bold mb-2 italic">S = N · S₁</div>
                    <div class="formula-card">
                        <div class="text-[10px] text-slate-400 font-bold mb-2 uppercase">Кількість опор</div>
                        <div class="math text-3xl">
                            p = <div class="fraction">
                                <span class="fraction-top">F</span>
                                <span class="fraction-bottom">N · S₁</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="node-container">
                <div id="btn-3" class="placeholder-btn" onclick="toggleNode(3)"><span>?</span></div>
                <div id="node-3" class="hidden-node text-center" onclick="toggleNode(3)">
                    <div class="text-sm text-blue-600 font-bold mb-2 italic">S₁ = l · d</div>
                    <div class="formula-card">
                        <div class="text-[10px] text-slate-400 font-bold mb-2 uppercase">Геометрія опори</div>
                        <div class="math text-3xl">
                            p = <div class="fraction">
                                <span class="fraction-top">F</span>
                                <span class="fraction-bottom">l · d</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Фінальні результати -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-16 w-full px-4">
            <div id="route-1-2" class="route-card">
                <div class="text-xs text-emerald-600 font-bold mb-4 uppercase tracking-[0.2em]">Результат (1+2)</div>
                <div class="math text-5xl text-slate-800">
                    p = <div class="fraction">
                        <span class="fraction-top">m · g</span>
                        <span class="fraction-bottom">N · S₁</span>
                    </div>
                </div>
            </div>

            <div id="route-1-3" class="route-card">
                <div class="text-xs text-emerald-600 font-bold mb-4 uppercase tracking-[0.2em]">Результат (1+3)</div>
                <div class="math text-5xl text-slate-800">
                    p = <div class="fraction">
                        <span class="fraction-top">m · g</span>
                        <span class="fraction-bottom">l · d</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let states = { 1: false, 2: false, 3: false };

        function toggleNode(id) {
            states[id] = !states[id];
            const btn = document.getElementById(`btn-${id}`);
            const node = document.getElementById(`node-${id}`);
            
            if (states[id]) {
                btn.style.display = 'none';
                node.className = 'visible-node text-center';
            } else {
                node.className = 'hidden-node';
                btn.style.display = 'flex';
            }
            
            updateView();
        }

        function resetAll() {
            for(let i=1; i<=3; i++) {
                if (states[i]) toggleNode(i);
            }
        }

        function updateView() {
            const r12 = document.getElementById('route-1-2');
            const r13 = document.getElementById('route-1-3');
            
            if (states[1] && states[2]) r12.classList.add('visible');
            else r12.classList.remove('visible');
            
            if (states[1] && states[3]) r13.classList.add('visible');
            else r13.classList.remove('visible');

            requestAnimationFrame(() => {
                setTimeout(drawArrows, 50);
            });
        }

        function drawArrows() {
            const svg = document.getElementById('arrow-canvas');
            const paths = svg.querySelectorAll('path, text');
            paths.forEach(el => el.remove());

            const scrollX = window.scrollX;
            const scrollY = window.scrollY;

            const getPos = (id) => {
                const el = document.getElementById(id);
                if (!el || el.classList.contains('hidden-node') || el.offsetParent === null) return null;
                const rect = el.getBoundingClientRect();
                return {
                    x: rect.left + rect.width / 2 + scrollX,
                    yTop: rect.top + scrollY,
                    yBottom: rect.bottom + scrollY
                };
            };

            const start = getPos('start-node');
            const n1 = getPos('node-1');
            const n2 = getPos('node-2');
            const n3 = getPos('node-3');
            const r12 = getPos('route-1-2');
            const r13 = getPos('route-1-3');

            const drawLine = (p1, p2, num = null) => {
                if (!p1 || !p2) return;
                const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
                path.setAttribute("d", `M ${p1.x} ${p1.yBottom} L ${p2.x} ${p2.yTop}`);
                path.setAttribute("class", "arrow-line");
                path.setAttribute("marker-end", "url(#arrowhead)");
                svg.appendChild(path);

                if (num) {
                    const text = document.createElementNS("http://www.w3.org/2000/svg", "text");
                    const mx = p1.x + (p2.x - p1.x) * 0.45;
                    const my = p1.yBottom + (p2.yTop - p1.yBottom) * 0.45;
                    text.setAttribute("x", mx + (p2.x >= p1.x ? 12 : -22));
                    text.setAttribute("y", my);
                    text.setAttribute("class", "step-number");
                    text.textContent = num;
                    svg.appendChild(text);
                }
            };

            if (start) {
                if (n1) drawLine(start, n1, "1");
                if (n2) drawLine(start, n2, "2");
                if (n3) drawLine(start, n3, "3");
            }

            if (n1 && n2 && r12) {
                drawLine(n1, r12);
                drawLine(n2, r12);
            }
            if (n1 && n3 && r13) {
                drawLine(n1, r13);
                drawLine(n3, r13);
            }
        }

        window.addEventListener('load', drawArrows);
        window.addEventListener('resize', drawArrows);
    </script>
</body>
</html>
