<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДЗ: № 74.2 Гідравлічний прес</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&display=swap');
        
        body { 
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
        }

        .cambria-font { font-family: 'Cambria', 'Noto Sans', serif; }

        .fade-in-row {
            animation: fadeIn 0.4s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .star-animation {
            animation: starPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes starPop {
            0% { transform: scale(0) rotate(-20deg); opacity: 0; }
            100% { transform: scale(1) rotate(0); opacity: 1; }
        }

        select { text-align-last: center; cursor: pointer; }

        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        .viber-btn {
            background-color: #7360f2;
            transition: all 0.3s ease;
        }
        .viber-btn:hover {
            background-color: #5e4cc4;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const CheckCircle2 = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-green-500 w-6 h-6"><path d="M12 22c5.523 0 10-4.477 10-10S17.523 2 12 2 2 6.477 2 12s4.477 10 10 10z"/><path d="m9 12 2 2 4-4"/></svg>
        );
        const XCircle = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-red-400 w-6 h-6"><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></svg>
        );
        const AlertTriangle = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="w-3 h-3 text-amber-500"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        );

        const formatNum = (num) => {
            if (num === "" || num === undefined) return "";
            return num.toString().replace('.', ',');
        };

        const App = () => {
            const initialTasks = [
                { id: 1, f1: "50", s1: "200", f2: "", s2: "2", target: "f2", correct: 5000, uF: "Н", uS: "см²", uF2: "Н", uS2: "м²", uRes: "Н", warned: "s1" },
                { id: 2, f1: "0,5", s1: "10", f2: "250", s2: "", target: "s2", correct: 5, uF: "кН", uS: "см²", uF2: "Н", uS2: "см²", uRes: "см²", warned: "f1" },
                { id: 3, f1: "", s1: "400", f2: "1000", s2: "1", target: "f1", correct: 40, uF: "Н", uS: "см²", uF2: "Н", uS2: "м²", uRes: "Н", warned: "s1" },
                { id: 4, f1: "20", s1: "0,005", f2: "0,4", s2: "", target: "s2", correct: 0.1, uF: "Н", uS: "м²", uF2: "кН", uS2: "м²", uRes: "м²", warned: "f2" },
                { id: 5, f1: "", s1: "10", f2: "1,5", s2: "300", target: "f1", correct: 50, uF: "Н", uS: "см²", uF2: "кН", uS2: "см²", uRes: "Н", warned: "f2" },
                { id: 6, f1: "1,5", s1: "50", f2: "", s2: "150", target: "f2", correct: 4.5, uF: "кН", uS: "см²", uF2: "кН", uS2: "см²", uRes: "кН", warned: "f1" }
            ];

            const optionsMap = {
                1: [5000, 500, 50, 250],
                2: [5, 50, 500, 20],
                3: [40, 4, 400, 10],
                4: [0.1, 0.01, 1, 0.5],
                5: [50, 5, 500, 15],
                6: [4.5, 45, 0.45, 15]
            };

            const [tasks, setTasks] = useState([]);
            const [userInputs, setUserInputs] = useState({});
            const [results, setResults] = useState({});
            const [studentName, setStudentName] = useState("");
            const [showAward, setShowAward] = useState(false);
            const [finalStar, setFinalStar] = useState(false);
            const [copyStatus, setCopyStatus] = useState(false);
            
            const audioCtx = useRef(null);

            useEffect(() => {
                const ordered = initialTasks.map(t => ({
                    ...t,
                    opt: [...optionsMap[t.id]].sort(() => Math.random() - 0.5)
                }));
                setTasks(ordered);
            }, []);

            useEffect(() => {
                const allCorrect = tasks.length > 0 && tasks.every(t => results[t.id] === 'correct');
                if (allCorrect && !finalStar) {
                    setShowAward(true);
                }
            }, [results, tasks]);

            const playSound = (type) => {
                try {
                    if (!audioCtx.current) {
                        const AudioContextClass = window.AudioContext || window.webkitAudioContext;
                        if (AudioContextClass) audioCtx.current = new AudioContextClass();
                    }
                    if (audioCtx.current) {
                        const osc = audioCtx.current.createOscillator();
                        const gain = audioCtx.current.createGain();
                        osc.connect(gain); gain.connect(audioCtx.current.destination);
                        osc.frequency.setValueAtTime(type === 'success' ? 880 : 220, audioCtx.current.currentTime);
                        gain.gain.setValueAtTime(0.05, audioCtx.current.currentTime);
                        osc.start(); osc.stop(audioCtx.current.currentTime + 0.1);
                    }
                } catch (e) {}
            };

            const handleSelect = (id, val) => {
                if (val === "") return;
                setUserInputs(prev => ({ ...prev, [id]: val }));
                const task = tasks.find(t => t.id === id);
                const numericValue = parseFloat(val.toString().replace(',', '.'));
                
                if (Math.abs(numericValue - task.correct) < 0.00001) {
                    playSound('success'); 
                    setResults(prev => ({ ...prev, [id]: 'correct' }));
                } else {
                    playSound('error'); 
                    setResults(prev => ({ ...prev, [id]: 'wrong' }));
                }
            };

            const handleGetStar = () => {
                if (studentName.trim().length > 2) {
                    setShowAward(false);
                    setFinalStar(true);
                    confetti({
                        particleCount: 150,
                        spread: 70,
                        origin: { y: 0.6 },
                        colors: ['#fbbf24', '#f59e0b', '#ffffff']
                    });
                }
            };

            const sendToViber = () => {
                const date = new Date().toLocaleDateString('uk-UA');
                const text = `🌟 ЗВІТ ПРО ВИКОНАННЯ ДЗ 🌟\n\nУчень: ${studentName}\nПредмет: Фізика\nТема: Гідравлічний прес №74.2\nСтатус: ВСІ ЗАВДАННЯ ВИКОНАНО ВІРНО ✅\nДата: ${date}`;
                
                // Копіюємо в буфер обміну
                const textArea = document.createElement("textarea");
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                
                setCopyStatus(true);
                setTimeout(() => setCopyStatus(false), 3000);

                // Відкриваємо Viber через протокол (якщо встановлено)
                window.open(`viber://forward?text=${encodeURIComponent(text)}`, '_blank');
            };

            const DisplayValue = ({ val, unit, isWarned }) => (
                <div className="flex flex-col items-center whitespace-nowrap">
                    <div className="flex items-baseline justify-center gap-1.5">
                        <span className="text-xl md:text-2xl font-bold text-slate-700">{formatNum(val)}</span>
                        <span className="text-sm md:text-lg font-bold text-slate-400">{unit}</span>
                    </div>
                    {isWarned && (
                        <div className="flex items-center gap-1 mt-1 px-2 py-0.5 bg-amber-50 rounded text-[8px] md:text-[9px] text-amber-700 font-bold uppercase tracking-tighter border border-amber-100">
                            <AlertTriangle /> Увага: Одиниці
                        </div>
                    )}
                </div>
            );

            return (
                <div className="w-full min-h-screen py-6 md:py-10 px-2 md:px-4 flex justify-center items-start cambria-font text-slate-900 relative">
                    <div className="w-full max-w-7xl space-y-6 md:space-y-8">
                        <div className="text-center sm:text-left px-2 flex justify-between items-end">
                            <div>
                                <h1 className="text-2xl md:text-4xl font-black text-slate-800 tracking-tight">№74.2 Домашнє завдання</h1>
                                <p className="text-slate-500 mt-1 italic text-base md:text-lg font-bold">Гідравлічний прес (профі)</p>
                            </div>
                            {finalStar && (
                                <div className="hidden md:block bg-amber-100 px-4 py-2 rounded-full border border-amber-200 text-amber-700 font-bold animate-bounce">
                                    🌟 Відмінна робота!
                                </div>
                            )}
                        </div>

                        <div className="bg-white border border-slate-200 rounded-xl md:rounded-[2rem] shadow-xl table-container relative overflow-hidden">
                            <table className="w-full min-w-[700px] text-center border-collapse">
                                <thead>
                                    <tr className="bg-slate-50 border-b border-slate-100">
                                        <th colSpan="2" className="py-3 md:py-5 text-[9px] font-black text-blue-600 uppercase tracking-widest">Малий поршень (1)</th>
                                        <th colSpan="2" className="py-3 md:py-5 text-[9px] font-black text-rose-600 uppercase tracking-widest border-l border-slate-100">Великий поршень (2)</th>
                                        <th rowSpan="2" className="w-16 md:w-24 border-l border-slate-100">Статус</th>
                                    </tr>
                                    <tr className="bg-white text-slate-400 border-b border-slate-100">
                                        <th className="py-2 text-[10px] font-bold uppercase">Сила F₁</th>
                                        <th className="py-2 text-[10px] font-bold uppercase">Площа S₁</th>
                                        <th className="py-2 text-[10px] font-bold uppercase border-l border-slate-100">Сила F₂</th>
                                        <th className="py-2 text-[10px] font-bold uppercase">Площа S₂</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {tasks.map((t, idx) => (
                                        <tr key={t.id} className="fade-in-row hover:bg-slate-50/50 transition-colors" style={{animationDelay: `${idx * 0.05}s`}}>
                                            <td className="p-4 md:p-8">
                                                {t.target === 'f1' ? (
                                                    <div className="flex flex-col items-center gap-1">
                                                        <select onChange={(e) => handleSelect(t.id, e.target.value)} value={userInputs[t.id] || ''} 
                                                            className={`w-24 md:w-32 border-2 rounded-lg py-2 px-1 font-bold text-center transition-all ${results[t.id] === 'correct' ? 'bg-green-500 border-green-500 text-white' : results[t.id] === 'wrong' ? 'bg-red-50 border-red-300 text-red-700' : 'bg-white border-slate-200 hover:border-blue-300'}`}>
                                                            <option value="">?</option>{t.opt.map(o => <option key={o} value={o}>{formatNum(o)}</option>)}
                                                        </select>
                                                        <span className="text-[10px] font-bold text-slate-400 mt-1 uppercase">{t.uRes}</span>
                                                    </div>
                                                ) : <DisplayValue val={t.f1} unit={t.uF} isWarned={t.warned === 'f1'} />}
                                            </td>
                                            <td className="p-4 md:p-8">
                                                {t.target === 's1' ? (
                                                    <div className="flex flex-col items-center gap-1">
                                                        <select onChange={(e) => handleSelect(t.id, e.target.value)} value={userInputs[t.id] || ''} 
                                                            className={`w-24 md:w-32 border-2 rounded-lg py-2 px-1 font-bold text-center transition-all ${results[t.id] === 'correct' ? 'bg-green-500 border-green-500 text-white' : results[t.id] === 'wrong' ? 'bg-red-50 border-red-300 text-red-700' : 'bg-white border-slate-200 hover:border-blue-300'}`}>
                                                            <option value="">?</option>{t.opt.map(o => <option key={o} value={o}>{formatNum(o)}</option>)}
                                                        </select>
                                                        <span className="text-[10px] font-bold text-slate-400 mt-1 uppercase">{t.uRes}</span>
                                                    </div>
                                                ) : <DisplayValue val={t.s1} unit={t.uS} isWarned={t.warned === 's1'} />}
                                            </td>
                                            <td className="p-4 md:p-8 border-l border-slate-100">
                                                {t.target === 'f2' ? (
                                                    <div className="flex flex-col items-center gap-1">
                                                        <select onChange={(e) => handleSelect(t.id, e.target.value)} value={userInputs[t.id] || ''} 
                                                            className={`w-24 md:w-32 border-2 rounded-lg py-2 px-1 font-bold text-center transition-all ${results[t.id] === 'correct' ? 'bg-green-500 border-green-500 text-white' : results[t.id] === 'wrong' ? 'bg-red-50 border-red-300 text-red-700' : 'bg-white border-slate-200 hover:border-blue-300'}`}>
                                                            <option value="">?</option>{t.opt.map(o => <option key={o} value={o}>{formatNum(o)}</option>)}
                                                        </select>
                                                        <span className="text-[10px] font-bold text-slate-400 mt-1 uppercase">{t.uRes}</span>
                                                    </div>
                                                ) : <DisplayValue val={t.f2} unit={t.uF2} isWarned={t.warned === 'f2'} />}
                                            </td>
                                            <td className="p-4 md:p-8">
                                                {t.target === 's2' ? (
                                                    <div className="flex flex-col items-center gap-1">
                                                        <select onChange={(e) => handleSelect(t.id, e.target.value)} value={userInputs[t.id] || ''} 
                                                            className={`w-24 md:w-32 border-2 rounded-lg py-2 px-1 font-bold text-center transition-all ${results[t.id] === 'correct' ? 'bg-green-500 border-green-500 text-white' : results[t.id] === 'wrong' ? 'bg-red-50 border-red-300 text-red-700' : 'bg-white border-slate-200 hover:border-blue-300'}`}>
                                                            <option value="">?</option>{t.opt.map(o => <option key={o} value={o}>{formatNum(o)}</option>)}
                                                        </select>
                                                        <span className="text-[10px] font-bold text-slate-400 mt-1 uppercase">{t.uRes}</span>
                                                    </div>
                                                ) : <DisplayValue val={t.s2} unit={t.uS2} isWarned={t.warned === 's2'} />}
                                            </td>
                                            <td className="p-2 md:p-4 border-l border-slate-100">
                                                <div className="flex justify-center">
                                                    {results[t.id] === 'correct' ? <CheckCircle2 /> : results[t.id] === 'wrong' ? <XCircle /> : <div className="w-5 h-5 rounded-full border-2 border-dashed border-slate-200"></div>}
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>

                        {showAward && (
                            <div className="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/60 backdrop-blur-sm p-4">
                                <div className="bg-white rounded-3xl p-8 max-w-md w-full shadow-2xl border-4 border-amber-400 star-animation text-center">
                                    <div className="text-5xl mb-4">🏆</div>
                                    <h2 className="text-2xl font-black text-slate-800 mb-2">Чудова робота!</h2>
                                    <p className="text-slate-600 mb-6 font-bold uppercase text-sm tracking-wide">Введіть своє прізвище та ім'я, щоб отримати іменну зірочку:</p>
                                    <input 
                                        type="text" 
                                        value={studentName}
                                        onChange={(e) => setStudentName(e.target.value)}
                                        placeholder="Прізвище Ім'я"
                                        className="w-full border-2 border-slate-200 rounded-xl py-3 px-4 mb-4 text-center text-lg font-bold focus:border-blue-500 outline-none transition-colors"
                                    />
                                    <button 
                                        onClick={handleGetStar}
                                        className="w-full bg-amber-400 hover:bg-amber-500 text-amber-900 font-black py-4 rounded-xl text-xl shadow-lg transform active:scale-95 transition-all"
                                    >
                                        ОТРИМАТИ ЗІРКУ ✨
                                    </button>
                                </div>
                            </div>
                        )}

                        {finalStar && (
                            <div className="flex flex-col items-center justify-center py-10 fade-in-row space-y-8">
                                <div className="relative group star-animation">
                                    <svg viewBox="0 0 100 100" className="w-48 h-48 md:w-64 md:h-64 drop-shadow-2xl fill-amber-400">
                                        <path d="M50 0L61.8 36.2H100L69.1 58.7L80.9 94.9L50 72.4L19.1 94.9L30.9 58.7L0 36.2H38.2L50 0Z" />
                                    </svg>
                                    <div className="absolute inset-0 flex items-center justify-center text-center p-4">
                                        <span className="text-amber-900 font-black text-lg md:text-xl leading-tight">
                                            {studentName}
                                        </span>
                                    </div>
                                </div>
                                
                                <div className="text-center">
                                    <h3 className="text-2xl font-black text-amber-600 uppercase">Зірка знань ваша!</h3>
                                    <p className="text-slate-400 font-bold uppercase tracking-widest text-xs mt-1">Ви успішно розв'язали всі задачі</p>
                                </div>

                                <div className="w-full max-w-sm">
                                    <button 
                                        onClick={sendToViber}
                                        className="viber-btn w-full flex items-center justify-center gap-3 text-white font-black py-4 px-6 rounded-2xl shadow-xl active:scale-95 transform transition-all"
                                    >
                                        <svg className="w-6 h-6 fill-white" viewBox="0 0 24 24">
                                            <path d="M17.57 18c.41 0 .74-.33.74-.74v-1.1c0-.41-.33-.74-.74-.74s-.74.33-.74.74v1.1c0 .41.33.74.74.74zM12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm4.5 15.5h-9c-.83 0-1.5-.67-1.5-1.5v-9c0-.83.67-1.5 1.5-1.5h9c.83 0 1.5.67 1.5 1.5v9c0 .83-.67 1.5-1.5 1.5zM12 15c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3z"/>
                                        </svg>
                                        НАДІСЛАТИ ВЧИТЕЛЮ
                                    </button>
                                    {copyStatus && (
                                        <p className="text-green-600 text-center mt-3 font-bold text-sm animate-pulse">
                                            ✅ Текст звіту скопійовано! Вставте його у Viber.
                                        </p>
                                    )}
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
