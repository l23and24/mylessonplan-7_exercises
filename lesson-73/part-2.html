<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ДЗ: № 74.2 Гідравлічний прес</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;700;900&display=swap');
        
        body { 
            background: #f0f4f8;
            margin: 0; 
            min-height: 100vh;
            overflow-x: hidden;
        }

        .bg-animated {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, #e0e7ff 0%, #f1f5f9 100%);
        }

        .shape {
            position: absolute;
            background: rgba(255, 255, 255, 0.4);
            border-radius: 50%;
            filter: blur(40px);
            animation: move 20s infinite alternate;
        }

        @keyframes move {
            from { transform: translate(0, 0); }
            to { transform: translate(100px, 100px); }
        }

        .cambria-font { font-family: 'Cambria', 'Noto Sans', serif; }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .emoji-pop { animation: emojiPop 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes emojiPop {
            0% { transform: scale(0); }
            100% { transform: scale(1); }
        }

        .table-container {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }

        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='currentColor' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 0.5rem center;
            background-size: 1em;
            padding-right: 2rem;
        }
    </style>
</head>
<body>
    <div class="bg-animated">
        <div class="shape w-64 h-64 top-10 left-10" style="background: rgba(99, 102, 241, 0.15);"></div>
        <div class="shape w-96 h-96 bottom-20 right-10" style="background: rgba(245, 158, 11, 0.15); animation-delay: -5s;"></div>
    </div>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const App = () => {
            const initialTasks = [
                { id: 1, f1: "50", s1: "200", f2: "", s2: "2", target: "f2", correct: 5000, uF: "Н", uS: "см²", uF2: "Н", uS2: "м²", uRes: "Н", warned: "s1" },
                { id: 2, f1: "0,5", s1: "10", f2: "250", s2: "", target: "s2", correct: 5, uF: "кН", uS: "см²", uF2: "Н", uS2: "см²", uRes: "см²", warned: "f1" },
                { id: 3, f1: "", s1: "400", f2: "1000", s2: "1", target: "f1", correct: 40, uF: "Н", uS: "см²", uF2: "Н", uS2: "м²", uRes: "Н", warned: "s1" },
                { id: 4, f1: "20", s1: "0,005", f2: "0,4", s2: "", target: "s2", correct: 0.1, uF: "Н", uS: "м²", uF2: "кН", uS2: "м²", uRes: "м²", warned: "f2" },
                { id: 5, f1: "", s1: "10", f2: "1,5", s2: "300", target: "f1", correct: 50, uF: "Н", uS: "см²", uF2: "кН", uS2: "см²", uRes: "Н", warned: "f2" },
                { id: 6, f1: "1,5", s1: "50", f2: "", s2: "150", target: "f2", correct: 4.5, uF: "кН", uS: "см²", uF2: "кН", uS2: "см²", uRes: "кН", warned: "f1" }
            ];

            const optionsMap = {
                1: [5000, 500, 50, 250], 2: [5, 50, 500, 20], 3: [40, 4, 400, 10],
                4: [0.1, 0.01, 1, 0.5], 5: [50, 5, 500, 15], 6: [4.5, 45, 0.45, 15]
            };

            const [tasks, setTasks] = useState([]);
            const [results, setResults] = useState({});
            const [studentName, setStudentName] = useState("");
            const [showModal, setShowModal] = useState(false);
            const [finalAward, setFinalAward] = useState(false);
            const certificateRef = useRef(null);
            const audioCtx = useRef(null);

            useEffect(() => {
                setTasks(initialTasks.map(t => ({ ...t, opt: [...optionsMap[t.id]].sort(() => Math.random() - 0.5) })));
            }, []);

            useEffect(() => {
                if (tasks.length > 0 && tasks.every(t => results[t.id] === 'correct') && !finalAward) {
                    setShowModal(true);
                }
            }, [results]);

            const playSound = (type) => {
                if (!audioCtx.current) {
                    audioCtx.current = new (window.AudioContext || window.webkitAudioContext)();
                }
                const ctx = audioCtx.current;
                const osc = ctx.createOscillator();
                const gain = ctx.createGain();
                
                osc.connect(gain);
                gain.connect(ctx.destination);

                const now = ctx.currentTime;

                if (type === 'success') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(523.25, now); // C5
                    osc.frequency.exponentialRampToValueAtTime(1046.50, now + 0.1); // C6
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.exponentialRampToValueAtTime(0.01, now + 0.3);
                    osc.start(now);
                    osc.stop(now + 0.3);
                } else if (type === 'wrong') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(150, now);
                    osc.frequency.linearRampToValueAtTime(100, now + 0.2);
                    gain.gain.setValueAtTime(0.1, now);
                    gain.gain.linearRampToValueAtTime(0.01, now + 0.2);
                    osc.start(now);
                    osc.stop(now + 0.2);
                } else if (type === 'triumph') {
                    // Короткі фанфари
                    [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
                        const o = ctx.createOscillator();
                        const g = ctx.createGain();
                        o.connect(g);
                        g.connect(ctx.destination);
                        o.frequency.setValueAtTime(freq, now + i * 0.1);
                        g.gain.setValueAtTime(0.1, now + i * 0.1);
                        g.gain.exponentialRampToValueAtTime(0.01, now + i * 0.1 + 0.4);
                        o.start(now + i * 0.1);
                        o.stop(now + i * 0.1 + 0.4);
                    });
                }
            };

            const handleSelect = (id, val) => {
                if (!val) return;
                const task = tasks.find(t => t.id === id);
                const num = parseFloat(val.replace(',', '.'));
                const isCorrect = Math.abs(num - task.correct) < 0.0001;
                
                setResults(prev => ({ ...prev, [id]: isCorrect ? 'correct' : 'wrong' }));
                playSound(isCorrect ? 'success' : 'wrong');
            };

            const handleFinalize = () => {
                setShowModal(false); 
                setFinalAward(true); 
                playSound('triumph');
                confetti({
                    particleCount: 150,
                    spread: 80,
                    origin: { y: 0.6 },
                    colors: ['#fbbf24', '#f59e0b', '#ffffff', '#6366f1']
                });
            };

            const downloadImage = async () => {
                const canvas = await html2canvas(certificateRef.current, { backgroundColor: null, scale: 2 });
                const link = document.createElement('a');
                link.download = `Успіх_Фізика_${studentName}.png`;
                link.href = canvas.toDataURL();
                link.click();
            };

            return (
                <div className="w-full min-h-screen py-10 px-4 flex flex-col items-center cambria-font">
                    <div className="w-full max-w-5xl bg-white/90 backdrop-blur-md rounded-[2rem] shadow-2xl p-6 md:p-10 border border-white/50">
                        <header className="mb-8 border-b pb-6 flex flex-col md:flex-row justify-between items-center gap-4">
                            <div>
                                <h1 className="text-3xl font-black text-slate-800">№74.2 Гідравлічний прес</h1>
                                <p className="text-indigo-600 font-bold uppercase tracking-widest text-xs mt-1">Домашня робота з фізики</p>
                            </div>
                            <div className="bg-indigo-50 px-4 py-2 rounded-full border border-indigo-100">
                                <span className="text-indigo-700 font-bold">Прогрес: {Object.values(results).filter(v => v === 'correct').length}/6</span>
                            </div>
                        </header>

                        <div className="table-container">
                            <table className="w-full text-center border-collapse">
                                <thead className="bg-slate-800 text-white">
                                    <tr>
                                        <th className="p-4 rounded-tl-2xl text-[10px] uppercase tracking-widest">F₁ (Н)</th>
                                        <th className="p-4 text-[10px] uppercase tracking-widest">S₁ (см²)</th>
                                        <th className="p-4 text-[10px] uppercase tracking-widest border-l border-slate-700">F₂ (Н)</th>
                                        <th className="p-4 text-[10px] uppercase tracking-widest">S₂ (см²)</th>
                                        <th className="p-4 rounded-tr-2xl">Статус</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-100">
                                    {tasks.map(t => (
                                        <tr key={t.id} className="hover:bg-indigo-50/30 transition-colors">
                                            <td className="p-5 font-bold text-xl">{t.target === 'f1' ? (
                                                <select onChange={(e) => handleSelect(t.id, e.target.value)} className="border-2 border-slate-200 rounded-xl px-3 py-1 bg-white focus:border-indigo-500 outline-none transition-all">
                                                    <option value="">?</option>{t.opt.map(o => <option key={o} value={o}>{o.toString().replace('.', ',')}</option>)}
                                                </select>
                                            ) : t.f1}</td>
                                            <td className="p-5 font-bold text-xl">{t.target === 's1' ? (
                                                <select onChange={(e) => handleSelect(t.id, e.target.value)} className="border-2 border-slate-200 rounded-xl px-3 py-1 bg-white focus:border-indigo-500 outline-none transition-all">
                                                    <option value="">?</option>{t.opt.map(o => <option key={o} value={o}>{o.toString().replace('.', ',')}</option>)}
                                                </select>
                                            ) : t.s1}</td>
                                            <td className="p-5 font-bold text-xl border-l border-slate-50">{t.target === 'f2' ? (
                                                <select onChange={(e) => handleSelect(t.id, e.target.value)} className="border-2 border-slate-200 rounded-xl px-3 py-1 bg-white focus:border-indigo-500 outline-none transition-all">
                                                    <option value="">?</option>{t.opt.map(o => <option key={o} value={o}>{o.toString().replace('.', ',')}</option>)}
                                                </select>
                                            ) : t.f2}</td>
                                            <td className="p-5 font-bold text-xl">{t.target === 's2' ? (
                                                <select onChange={(e) => handleSelect(t.id, e.target.value)} className="border-2 border-slate-200 rounded-xl px-3 py-1 bg-white focus:border-indigo-500 outline-none transition-all">
                                                    <option value="">?</option>{t.opt.map(o => <option key={o} value={o}>{o.toString().replace('.', ',')}</option>)}
                                                </select>
                                            ) : t.s2}</td>
                                            <td className="p-5">
                                                {results[t.id] === 'correct' ? (
                                                    <span className="text-2xl animate-bounce inline-block">✅</span>
                                                ) : results[t.id] === 'wrong' ? (
                                                    <span className="text-2xl">❌</span>
                                                ) : (
                                                    <span className="text-2xl opacity-20">⚪</span>
                                                )}
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {showModal && (
                        <div className="fixed inset-0 bg-slate-900/80 backdrop-blur-lg flex items-center justify-center z-50 p-4">
                            <div className="bg-white p-10 rounded-[3rem] max-w-sm w-full text-center shadow-[0_0_50px_rgba(99,102,241,0.5)] emoji-pop border-t-8 border-indigo-500">
                                <div className="text-7xl mb-6">🤟</div>
                                <h2 className="text-3xl font-black mb-4 text-slate-800">Перемога!</h2>
                                <p className="mb-8 text-slate-500 font-medium">Всі задачі розв'язані правильно. Введіть ім'я для сертифіката:</p>
                                <input 
                                    type="text" 
                                    value={studentName} 
                                    onChange={(e)=>setStudentName(e.target.value)} 
                                    placeholder="Ваше Прізвище та Ім'я" 
                                    className="w-full border-b-4 border-indigo-100 p-4 mb-8 text-center font-bold text-xl outline-none focus:border-indigo-500 transition-all placeholder:text-slate-300"
                                />
                                <button 
                                    onClick={handleFinalize} 
                                    disabled={!studentName.trim()}
                                    className="w-full bg-indigo-600 hover:bg-indigo-700 disabled:opacity-50 disabled:cursor-not-allowed py-5 rounded-2xl font-black text-white text-lg shadow-xl transform active:scale-95 transition-all uppercase tracking-widest"
                                >
                                    ОТРИМАТИ НАГОРОДУ 🥳
                                </button>
                            </div>
                        </div>
                    )}

                    {finalAward && (
                        <div className="mt-12 flex flex-col items-center fade-in pb-20">
                            <div ref={certificateRef} className="bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 p-1.5 rounded-[2.5rem] shadow-[0_20px_50px_rgba(0,0,0,0.2)]">
                                <div className="bg-white rounded-[2.2rem] p-10 text-center flex flex-col items-center min-w-[320px] relative overflow-hidden">
                                    {/* Декор на картці */}
                                    <div className="absolute top-0 right-0 w-20 h-20 bg-indigo-50 rounded-bl-full opacity-50"></div>
                                    <div className="absolute bottom-0 left-0 w-16 h-16 bg-pink-50 rounded-tr-full opacity-50"></div>
                                    
                                    <div className="text-8xl mb-6 drop-shadow-xl hover:scale-110 transition-transform cursor-default">😎</div>
                                    <div className="space-y-2 z-10">
                                        <h3 className="text-3xl font-black text-slate-800 leading-tight tracking-tight">{studentName}</h3>
                                        <div className="h-1.5 w-16 bg-indigo-500 mx-auto rounded-full"></div>
                                        <p className="text-xs uppercase tracking-[0.3em] font-black text-slate-400 mt-4">Курс Фізики • 100% Результат</p>
                                    </div>
                                    <div className="mt-8 bg-indigo-600 text-white px-6 py-2 rounded-full text-sm font-black shadow-lg">
                                        ЕКСПЕРТ З ГІДРАВЛІКИ
                                    </div>
                                    <p className="mt-4 text-[10px] text-slate-300 font-bold uppercase">{new Date().toLocaleDateString('uk-UA')}</p>
                                </div>
                            </div>

                            <div className="flex flex-col gap-4 w-full items-center mt-10">
                                <button onClick={downloadImage} className="w-full max-w-xs bg-slate-900 text-white px-10 py-5 rounded-2xl font-black flex items-center justify-center gap-4 shadow-2xl hover:bg-indigo-600 transition-all active:scale-95 group">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className="group-hover:translate-y-1 transition-transform"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                                    ЗБЕРЕГТИ КАРТКУ
                                </button>
                                <button onClick={() => window.location.reload()} className="text-slate-500 font-bold hover:text-indigo-600 transition-colors text-sm uppercase tracking-widest">Спробувати ще раз</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
